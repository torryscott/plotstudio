title: Distribution
name: distplotbuilder
jus: '3.0'
stage: 0
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Variable
        children:
          - type: VariablesListBox
            name: var
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Group By (optional)
        children:
          - type: VariablesListBox
            name: groupVar
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: Panels (optional)
        children:
          - type: VariablesListBox
            name: facetVar
            maxItemCount: 1
            isTarget: true
  # The variables are the panel's only job: everything else lives on the
  # chart (the "About this chart" guidance box was tried and removed Jul
  # 2026 per Torry - an empty panel says "look right" on its own). One
  # data-tip Label survives, at the moment of assignment; it is restyled
  # (muted italic) by jamovi/js/distplotbuilder.js (shared gbPanelTip
  # helper), whose TIP_TEXT anchor must match this string exactly or the
  # line just renders plain.
  - type: Label
    margin: small
    label: 'One numeric variable. Group By overlays shapes; Panels separates them.'
compilerMode: tame
