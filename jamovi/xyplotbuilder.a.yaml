---
name:  xyplotbuilder
title: Scatter
menuGroup: Plot Studio
menuSubgroup: Plots
category: plots
version: '0.0.1'
jas: '1.2'

description:
    main: >
        Show the relationship between two continuous variables as a scatter
        plot, with optional linear, polynomial, or LOESS fit lines and
        confidence bands, data ellipses, marginal distributions, and
        Pearson, Spearman, or Kendall correlation statistics. Color by a
        grouping variable, add panels, or switch to a binned tile heatmap
        for dense data.

options:

    - name: annotationsJson
      title: Annotations (JSON)
      type: String
      default: ''
      hidden: true

    - name: clientBundleHash
      title: Client bundle hash (internal)
      type: String
      default: ''
      hidden: true

    - name: data
      type: Data

    - name: errorBarType
      title: Error Bars
      type: List
      options:
        - name: se
          title: Standard Error
        - name: sd
          title: Standard Deviation
        - name: ci95
          title: 95% Confidence Interval
        - name: ci99
          title: 99% Confidence Interval
        - name: none
          title: None
      default: se
      hidden: true

    - name: exportPath
      title: Save Path
      type: String
      default: ""
      hidden: true

    - name: exportRequest
      title: Pending Export Request
      type: String
      default: ""
      hidden: true

    - name: facetVar
      title: Panels (optional)
      type: Variable
      suggested:
        - nominal
        - ordinal
      permitted:
        - factor

    - name: graphType
      title: Graph Type
      type: List
      options:
        - name: scatter
          title: Scatter Plot
      default: scatter
      hidden: true

    - name: groupVar
      title: Group By (optional)
      type: Variable
      suggested:
        - nominal
        - ordinal
      permitted:
        - factor

    # UI removed Jul 9 2026 per Torry ("remove the label points by
    # input"); the option stays hidden so old .omv files load and the
    # JS label path stays dormant-but-functional for them.
    - name: labelVar
      title: Label Points By (optional)
      type: Variable
      hidden: true

    - name: paletteLibrary
      title: Saved Palette Library Action
      type: String
      default: ''
      hidden: true

    - name: showDataPoints
      title: Show Data Points
      type: Bool
      default: false
      hidden: true

    # UI removed Jul 9 2026 per Torry ("remove the size by bubble
    # option") - back to the pre-Small-Wins hidden/dormant state.
    - name: sizeVar
      title: Size By (bubble, optional)
      type: Variable
      suggested:
        - continuous
      permitted:
        - numeric
      hidden: true

    - name: styleLibrary
      title: Saved Chart Style Library Action
      type: String
      default: ''
      hidden: true

    - name: styleStamp
      title: Default Style Applied Stamp
      type: Bool
      default: false
      hidden: true

    - name: summaryFunc
      title: Summary
      type: List
      options:
        - name: mean
          title: Mean
        - name: median
          title: Median
      default: mean
      hidden: true

    - name: xvar
      title: X Variable
      type: Variable
      suggested:
        - continuous
        - ordinal
      permitted:
        - numeric
        - factor

    - name: xyBin
      title: Graph Type
      type: List
      hidden: true
      options:
        - name: none
          title: Individual Points
        - name: square
          title: Heatmap
      default: none

    - name: xyBinCount
      title: Bins Per Axis
      type: Number
      default: 30
      min: 2
      max: 200
      hidden: true

    - name: xyCILevel
      title: Confidence Band Level
      type: Number
      default: 0.95
      min: 0.5
      max: 0.999
      hidden: true

    - name: xyDensity2DLevels
      title: Density Contour Levels
      type: Number
      default: 5
      min: 1
      max: 12
      hidden: true

    - name: xyEllipseLevel
      title: Data Ellipse Level
      type: Number
      default: 0.95
      min: 0.5
      max: 0.999
      hidden: true

    - name: xyFitType
      title: Fit Type
      type: List
      options:
        - name: linear
          title: Linear (OLS)
        - name: poly2
          title: Quadratic (poly 2)
        - name: poly3
          title: Cubic (poly 3)
        - name: loess
          title: LOESS (smooth)
      default: linear
      hidden: true

    - name: xyLoessSpan
      title: LOESS Span
      type: Number
      default: 0.75
      min: 0.1
      max: 1.5
      hidden: true

    - name: xyMarginal
      title: Marginals
      type: List
      hidden: true
      options:
        - name: none
          title: None
        - name: histogram
          title: Histogram
        - name: density
          title: Density
      default: none

    - name: xyMarginalBins
      title: Marginal Bins (histogram)
      type: Number
      default: 30
      min: 5
      max: 100
      hidden: true

    - name: xyShowDensity2D
      title: Show Density Contours
      type: Bool
      default: false
      hidden: true

    - name: xyStatsCorrType
      title: Correlation Method
      type: List
      options:
        - name: pearson
          title: Pearson
        - name: spearman
          title: Spearman
        - name: kendall
          title: Kendall
      default: pearson
      hidden: true

    - name: yvar
      title: Y Variable
      type: Variable
      suggested:
        - continuous
        - ordinal
      permitted:
        - numeric
        - factor

    - name: chartSpec
      title: Chart spec (internal)
      type: String
      default: ''
      hidden: true
...
