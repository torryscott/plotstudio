title: Likert / Survey
name: likertplotbuilder
jus: '3.0'
stage: 0
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Items
        children:
          - type: VariablesListBox
            name: items
            isTarget: true
  # The variables are the panel's only job: everything else lives on the
  # chart (the guidance box was removed suite-wide Jul 2026 per Torry -
  # an empty panel says "look right" on its own). The data-tip Label
  # below is restyled muted italic by jamovi/js/likertplotbuilder.js
  # (shared gbPanelTip helper); its TIP_TEXT must match this string
  # exactly.
  - type: Label
    margin: small
    label: 'All items must share one response scale (e.g. 1-5 agreement).'
compilerMode: tame
